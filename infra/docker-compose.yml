services:
  # Инициализация сервиса данных.
  data-api:
    build:
      context: ../services/data-api
    container_name: data-api
    ports:
      - "8080:8080"
    environment:
      ITEMS_COUNT: 1000
      SEED_BASE: 1337
      PORT: 8080

  # Инициализация коллектора метрик.
  metrics-collector:
    build:
      context: ../services/metrics-collector
    container_name: metrics-collector
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      DATA_DIR: /data
    volumes:
      - ./data:/data

  # Инициализация SUT приложения.
  next-app:
    build:
      context: ../apps/next-app
      args:
        NEXT_PUBLIC_SUT_ID: next_app
    container_name: next-app
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_SUT_ID: next_app
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация прокси для централизованного access-логирования.
  proxy:
    image: nginx:stable
    container_name: proxy
    ports:
      - "8000:80"
    environment:
      - SUT_TARGET_HOST=${SUT_TARGET_HOST:-next-app}
      - SUT_TARGET_PORT=${SUT_TARGET_PORT:-3000}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - next-app
      - data-api
      - metrics-collector

  # Инициализация контейнера раннера для запуска вручную.
  runner:
    build:
      context: ../runner
    container_name: runner
    environment:
      - SUT_ID=${SUT_ID:-next_app}
      - RUNNER_MODES=${RUNNER_MODES:-cold,warm}
      - RUNNER_ITERATIONS=${RUNNER_ITERATIONS:-3}
      - RUNNER_REGEN_COUNT=${RUNNER_REGEN_COUNT:-3}
      - RUNNER_HEADLESS=${RUNNER_HEADLESS:-true}
    depends_on:
      - proxy
      - next-app
      - data-api
      - metrics-collector