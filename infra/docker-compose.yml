services:
  # Инициализация сервиса данных.
  data-api:
    build:
      context: ../services/data-api
    container_name: data-api
    ports:
      - "8080:8080"
    environment:
      ITEMS_COUNT: 1000
      SEED_BASE: 1337
      PORT: 8080

  # Инициализация коллектора метрик.
  metrics-collector:
    build:
      context: ../services/metrics-collector
    container_name: metrics-collector
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      DATA_DIR: /data
    volumes:
      - ${INFRA_DIR:-.}/data:/data

  # Инициализация SUT приложения.
  next-app:
    build:
      context: ../apps/next-app
      args:
        NEXT_PUBLIC_SUT_ID: next_app
    container_name: next-app
    profiles: ["next-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_SUT_ID: next_app
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Remix.
  remix-app:
    build:
      context: ../apps/remix-app
      args:
        REMIX_PUBLIC_SUT_ID: remix_app
    container_name: remix-app
    profiles: ["remix-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3002:3000"
    environment:
      REMIX_PUBLIC_SUT_ID: remix_app
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Remix v3 (alpha, Preact-based).
  remix3-app:
    build:
      context: ../apps/remix3-app
      args:
        SUT_ID: remix3_app
    container_name: remix3-app
    profiles: ["remix3-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3003:3000"
    environment:
      SUT_ID: remix3_app
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Vanilla JS (Baseline).
  vanilla-app:
    build:
      context: ../apps/vanilla-app
      args:
        SUT_ID: vanilla_app
    container_name: vanilla-app
    profiles: ["vanilla-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3004:3000"
    environment:
      SUT_ID: vanilla_app
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на SvelteKit.
  svelte-app:
    build:
      context: ../apps/svelte-app
      args:
        SUT_ID: svelte_app
    container_name: svelte-app
    profiles: ["svelte-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3005:3000"
    environment:
      SUT_ID: svelte_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на React Router v7.
  react-router-app:
    build:
      context: ../apps/react-router-app
      args:
        RR_PUBLIC_SUT_ID: react_router_app
    container_name: react-router-app
    profiles: ["react-router-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3006:3000"
    environment:
      RR_PUBLIC_SUT_ID: react_router_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Next.js Pages Router.
  next-pages-app:
    build:
      context: ../apps/next-pages-app
      args:
        NEXT_PUBLIC_SUT_ID: next_pages_app
    container_name: next-pages-app
    profiles: ["next-pages-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3007:3000"
    environment:
      NEXT_PUBLIC_SUT_ID: next_pages_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Astro MPA.
  astro-app:
    build:
      context: ../apps/astro-app
      args:
        SUT_ID: astro_app
    container_name: astro-app
    profiles: ["astro-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3008:3000"
    environment:
      SUT_ID: astro_app
      DATA_API_URL: http://data-api:8080
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на TanStack Start.
  tanstack-app:
    build:
      context: ../apps/tanstack-app
      args:
        VITE_SUT_ID: tanstack_app
    container_name: tanstack-app
    profiles: ["tanstack-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3009:3000"
    environment:
      VITE_SUT_ID: tanstack_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на SolidStart.
  solidstart-app:
    build:
      context: ../apps/solidstart-app
      args:
        VITE_SUT_ID: solidstart_app
    container_name: solidstart-app
    profiles: ["solidstart-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3010:3000"
    environment:
      VITE_SUT_ID: solidstart_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Astro MPA + View Transitions.
  astro-vt-app:
    build:
      context: ../apps/astro-vt-app
      args:
        SUT_ID: astro_vt_app
    container_name: astro-vt-app
    profiles: ["astro-vt-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3011:3000"
    environment:
      SUT_ID: astro_vt_app
      DATA_API_URL: http://data-api:8080
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Qwik (Resumability, SPA router).
  qwik-app:
    build:
      context: ../apps/qwik-app
      args:
        VITE_SUT_ID: qwik_app
    container_name: qwik-app
    profiles: ["qwik-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3012:3000"
    environment:
      VITE_SUT_ID: qwik_app
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Nuxt 3 (Vue 3, SSR + SPA Navigation).
  nuxt-app:
    build:
      context: ../apps/nuxt-app
    container_name: nuxt-app
    profiles: ["nuxt-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3013:3000"
    environment:
      NUXT_DATA_API_URL: http://data-api:8080
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация SUT приложения на Angular 19 (SSR + SPA Navigation).
  angular-app:
    build:
      context: ../apps/angular-app
    container_name: angular-app
    profiles: ["angular-app"]
    networks:
      default:
        aliases:
          - sut-app
    ports:
      - "3014:3000"
    environment:
      DATA_API_URL: http://data-api:8080
    depends_on:
      - data-api
      - metrics-collector

  # Инициализация прокси для централизованного access-логирования.
  proxy:
    image: nginx:stable
    container_name: proxy
    ports:
      - "8000:80"
    environment:
      - SUT_TARGET_HOST=${SUT_TARGET_HOST:-next-app}
      - SUT_TARGET_PORT=${SUT_TARGET_PORT:-3000}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    volumes:
      - ${INFRA_DIR:-.}/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ${INFRA_DIR:-.}/logs/nginx:/var/log/nginx
      - ${INFRA_DIR:-.}/shared-static:/usr/share/nginx/html/shared:ro
    depends_on:
      - data-api
      - metrics-collector

  # Runner запускается только через `docker compose run --rm runner` (profiles предотвращает
  # автозапуск при `docker compose up -d`, но docker compose run игнорирует profiles).
  runner:
    build:
      context: ../runner
    container_name: runner
    profiles: ["runner"]
    environment:
      - SUT_ID=${SUT_ID:-next_app,remix_app,remix3_app,vanilla_app}
      - RUNNER_MODES=${RUNNER_MODES:-cold,warm}
      - RUNNER_ITERATIONS=${RUNNER_ITERATIONS:-2}
      - RUNNER_REGEN_COUNT=${RUNNER_REGEN_COUNT:-3}
      - RUNNER_HEADLESS=${RUNNER_HEADLESS:-true}
    depends_on:
      - proxy
      - data-api
      - metrics-collector