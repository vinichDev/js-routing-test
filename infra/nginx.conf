# Определение конфигурации proxy как единой точки входа стенда.
events {}

http {
  # Определение расширенного формата access-лога.
  log_format main_ext
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    'rt=$request_time urt=$upstream_response_time '
    'run_id="$http_x_run_id" trace_id="$http_x_trace_id" sut_id="$http_x_sut_id" '
    'ua="$http_user_agent"';

  access_log /var/log/nginx/access.log main_ext;

  server {
    listen 80;

    # Маршрутизация запросов интерфейса на Next.js приложение.
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Run-Id $http_x_run_id;
      proxy_set_header X-Trace-Id $http_x_trace_id;
      proxy_set_header X-Sut-Id $http_x_sut_id;

      proxy_pass http://next-app:3000;
    }

    # Маршрутизация запросов данных на Data API с сохранением префикса /api/.
    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Run-Id $http_x_run_id;
      proxy_set_header X-Trace-Id $http_x_trace_id;
      proxy_set_header X-Sut-Id $http_x_sut_id;

      proxy_pass http://data-api:8080;
    }

    # Маршрутизация запросов метрик на Metrics Collector с сохранением префикса /metrics/.
    location /metrics/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Run-Id $http_x_run_id;
      proxy_set_header X-Trace-Id $http_x_trace_id;
      proxy_set_header X-Sut-Id $http_x_sut_id;

      proxy_pass http://metrics-collector:8090;
    }
  }
}